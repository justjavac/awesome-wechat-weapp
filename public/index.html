<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>微信小程序资源搜索</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("theme");
          const system = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = saved || system;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --field: #ffffff;
        --text: #20242a;
        --description: #394150;
        --muted: #667085;
        --line: #d9dee7;
        --accent: #16775b;
        --accent-soft: #e2f3ed;
        --tag-bg: #fbfcfd;
        --warning: #965b00;
        --focus: #2d9c7a;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #101418;
        --panel: #171d23;
        --field: #11171d;
        --text: #edf2f7;
        --description: #c7d0da;
        --muted: #98a6b5;
        --line: #2c3844;
        --accent: #5bd0a9;
        --accent-soft: #17352c;
        --tag-bg: #121920;
        --warning: #f0b45f;
        --focus: #74dfbc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .wrap {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 28px 0 22px;
      }

      .hero-row {
        align-items: start;
        display: flex;
        gap: 16px;
        justify-content: space-between;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 38px);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .summary {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) 180px 180px;
        gap: 10px;
      }

      input,
      select {
        min-height: 42px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--field);
        color: var(--text);
        padding: 0 12px;
        font: inherit;
      }

      input:focus-visible,
      select:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .theme-toggle {
        align-items: center;
        background: var(--field);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        flex: 0 0 auto;
        font: inherit;
        gap: 8px;
        min-height: 38px;
        padding: 0 12px;
        white-space: nowrap;
      }

      .theme-toggle:hover {
        border-color: var(--accent);
      }

      .theme-icon {
        color: var(--accent);
        font-size: 16px;
        line-height: 1;
      }

      main {
        padding: 22px 0 40px;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .pill {
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        padding: 4px 10px;
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }

      .card {
        min-height: 176px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.3;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .card a {
        color: var(--accent);
        text-decoration: none;
      }

      .card a:hover {
        text-decoration: underline;
      }

      .description {
        margin: 0;
        color: var(--description);
        flex: 1;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .tag {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        background: var(--tag-bg);
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 28px;
        color: var(--muted);
        background: var(--panel);
        text-align: center;
      }

      @media (max-width: 760px) {
        .hero-row {
          align-items: stretch;
          flex-direction: column;
        }

        .theme-toggle {
          justify-content: center;
          width: fit-content;
        }

        .controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div class="hero-row">
          <div>
            <h1>微信小程序资源搜索</h1>
            <p class="summary">按标题、描述、分类、语言和主题筛选资源。</p>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深色模式" aria-pressed="false">
            <span class="theme-icon" id="themeIcon" aria-hidden="true">◐</span>
            <span id="themeLabel">暗色</span>
          </button>
        </div>
        <div class="controls">
          <input id="query" type="search" placeholder="搜索资源、主题或描述" autocomplete="off" />
          <select id="category" aria-label="分类"></select>
          <select id="difficulty" aria-label="难度">
            <option value="">全部难度</option>
            <option value="beginner">入门</option>
            <option value="intermediate">进阶</option>
            <option value="advanced">高级</option>
            <option value="unknown">未知</option>
          </select>
        </div>
      </div>
    </header>
    <main class="wrap">
      <div class="stats" id="stats"></div>
      <section class="grid" id="results"></section>
    </main>
    <script>
      const state = {
        query: "",
        category: "",
        difficulty: "",
        resources: []
      };

      const labels = {
        beginner: "入门",
        intermediate: "进阶",
        advanced: "高级",
        unknown: "未知"
      };

      const queryInput = document.querySelector("#query");
      const categorySelect = document.querySelector("#category");
      const difficultySelect = document.querySelector("#difficulty");
      const results = document.querySelector("#results");
      const stats = document.querySelector("#stats");
      const themeToggle = document.querySelector("#themeToggle");
      const themeIcon = document.querySelector("#themeIcon");
      const themeLabel = document.querySelector("#themeLabel");

      function currentTheme() {
        return document.documentElement.dataset.theme === "dark" ? "dark" : "light";
      }

      function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        themeToggle.setAttribute("aria-pressed", String(theme === "dark"));
        themeToggle.setAttribute("aria-label", theme === "dark" ? "切换亮色模式" : "切换深色模式");
        themeIcon.textContent = theme === "dark" ? "☀" : "◐";
        themeLabel.textContent = theme === "dark" ? "亮色" : "暗色";
        try {
          localStorage.setItem("theme", theme);
        } catch {
          // Ignore storage failures; the visual state still changes for this session.
        }
      }

      setTheme(currentTheme());

      function textFor(resource) {
        return [
          resource.title,
          resource.description,
          resource.category,
          resource.section,
          resource.metadata.language.join(" "),
          resource.metadata.topics.join(" ")
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
      }

      function renderOptions() {
        const categories = [...new Set(state.resources.map((item) => item.category))];
        categorySelect.innerHTML = [
          '<option value="">全部分类</option>',
          ...categories.map((category) => `<option value="${category}">${category}</option>`)
        ].join("");
      }

      function filtered() {
        const query = state.query.trim().toLowerCase();
        return state.resources.filter((resource) => {
          if (state.category && resource.category !== state.category) return false;
          if (state.difficulty && resource.metadata.difficulty !== state.difficulty) return false;
          if (query && !textFor(resource).includes(query)) return false;
          return true;
        });
      }

      function render() {
        const rows = filtered();
        stats.innerHTML = [
          `<span class="pill">${rows.length} / ${state.resources.length} 条资源</span>`,
          state.category ? `<span class="pill">${state.category}</span>` : "",
          state.difficulty ? `<span class="pill">${labels[state.difficulty]}</span>` : ""
        ].join("");

        if (rows.length === 0) {
          results.className = "";
          results.innerHTML = '<div class="empty">没有匹配的资源</div>';
          return;
        }

        results.className = "grid";
        results.innerHTML = rows
          .map((resource) => {
            const metadata = resource.metadata;
            const tags = [
              resource.category,
              resource.section,
              labels[metadata.difficulty],
              ...metadata.language,
              ...metadata.topics.slice(0, 3)
            ].filter(Boolean);

            return `
              <article class="card">
                <h2><a href="${resource.url}" target="_blank" rel="noreferrer">${resource.title}</a></h2>
                <p class="description">${resource.description || "暂无描述"}</p>
                <div class="meta">${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
              </article>
            `;
          })
          .join("");
      }

      queryInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        render();
      });
      categorySelect.addEventListener("change", (event) => {
        state.category = event.target.value;
        render();
      });
      difficultySelect.addEventListener("change", (event) => {
        state.difficulty = event.target.value;
        render();
      });
      themeToggle.addEventListener("click", () => {
        setTheme(currentTheme() === "dark" ? "light" : "dark");
      });

      fetch("./api/resources.json")
        .then((response) => response.json())
        .then((payload) => {
          state.resources = payload.resources;
          renderOptions();
          render();
        })
        .catch((error) => {
          results.className = "";
          results.innerHTML = `<div class="empty">资源数据加载失败：${error.message}</div>`;
        });
    </script>
  </body>
</html>
